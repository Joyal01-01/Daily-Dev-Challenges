<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Infinite Scroll Gallery</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <header>
      <h1>📸 Infinite Gallery</h1>
      <p>Scroll down to load more photos</p>
    </header>

    <main>
      <div class="gallery" id="gallery"></div>
      <div class="spinner" id="spinner" aria-label="Loading more images">
        <div class="spinner__ring"></div>
      </div>
      <!-- Sentinel element — IntersectionObserver watches this -->
      <div class="sentinel" id="sentinel"></div>
    </main>

    <script src="script.js"></script>
  </body>
</html>
