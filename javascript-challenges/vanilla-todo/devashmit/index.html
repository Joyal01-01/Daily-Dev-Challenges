<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Vanilla JS Todo App</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <div class="app">
      <header class="app__header">
        <h1>✅ Todo App</h1>
      </header>

      <!-- Add form -->
      <form class="add-form" id="addForm">
        <input
          class="add-form__input"
          type="text"
          id="todoInput"
          placeholder="What needs to be done?"
          autocomplete="off"
          aria-label="New todo text"
          maxlength="120"
        />
        <button class="add-form__btn" type="submit" aria-label="Add todo">Add</button>
      </form>

      <!-- Filter tabs -->
      <div class="filters" role="tablist" aria-label="Filter todos">
        <button class="filter-btn active" data-filter="all" role="tab" aria-selected="true">All</button>
        <button class="filter-btn" data-filter="active" role="tab" aria-selected="false">Active</button>
        <button class="filter-btn" data-filter="completed" role="tab" aria-selected="false">Completed</button>
      </div>

      <!-- Todo list -->
      <ul class="todo-list" id="todoList" role="list" aria-label="Todo items"></ul>

      <!-- Footer -->
      <footer class="app__footer" id="appFooter">
        <span id="itemCount">0 items left</span>
        <button class="clear-btn" id="clearCompleted">Clear completed</button>
      </footer>
    </div>

    <script src="script.js"></script>
  </body>
</html>
