<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Real-time Search Filter</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <div class="app">
      <header class="app__header">
        <h1>🔍 Country Search</h1>
        <p class="app__subtitle">Search and filter 50+ countries in real time</p>
      </header>

      <!-- Search input -->
      <div class="search-wrap">
        <input
          class="search-input"
          type="text"
          id="searchInput"
          placeholder="Type to search countries…"
          autocomplete="off"
          aria-label="Search countries"
          aria-controls="resultsList"
          aria-autocomplete="list"
        />
        <span class="search-icon" aria-hidden="true">🔍</span>
      </div>

      <!-- Category filter chips -->
      <div class="chips" role="group" aria-label="Filter by continent">
        <button class="chip active" data-filter="all">All</button>
        <button class="chip" data-filter="Asia">Asia</button>
        <button class="chip" data-filter="Europe">Europe</button>
        <button class="chip" data-filter="Americas">Americas</button>
        <button class="chip" data-filter="Africa">Africa</button>
        <button class="chip" data-filter="Oceania">Oceania</button>
      </div>

      <!-- Result count -->
      <p class="result-count" id="resultCount" aria-live="polite"></p>

      <!-- Results list -->
      <ul class="results-list" id="resultsList" role="list" aria-label="Search results"></ul>
    </div>

    <script src="script.js"></script>
  </body>
</html>
