<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Habit Tracker</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <div class="phone-frame">
      <!-- Header -->
      <header class="app-header">
        <div>
          <p class="app-header__greeting">Good morning 👋</p>
          <h1 class="app-header__title">My Habits</h1>
        </div>
        <button class="icon-btn" aria-label="Add habit">＋</button>
      </header>

      <!-- Weekly streak calendar -->
      <section class="streak-section" aria-label="Weekly streak">
        <h2 class="section-title">This Week</h2>
        <div class="week-row" id="weekRow" role="list"></div>
      </section>

      <!-- Habits list -->
      <section class="habits-section" aria-label="Daily habits">
        <h2 class="section-title">Today's Habits</h2>
        <ul class="habits-list" id="habitsList" role="list"></ul>
      </section>

      <!-- Bottom nav -->
      <nav class="bottom-nav" aria-label="App navigation">
        <button class="nav-btn active" aria-label="Today" aria-current="page">
          <span class="nav-btn__icon" aria-hidden="true">📅</span>
          <span class="nav-btn__label">Today</span>
        </button>
        <button class="nav-btn" aria-label="Stats">
          <span class="nav-btn__icon" aria-hidden="true">📊</span>
          <span class="nav-btn__label">Stats</span>
        </button>
        <button class="nav-btn" aria-label="Settings">
          <span class="nav-btn__icon" aria-hidden="true">⚙️</span>
          <span class="nav-btn__label">Settings</span>
        </button>
      </nav>
    </div>

    <script src="script.js"></script>
  </body>
</html>
