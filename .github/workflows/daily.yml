name: Daily Challenge System (No Duplicate + Viral)

on:
  schedule:
    - cron: "0 3 * * *"
  workflow_dispatch:

jobs:
  daily-system:
    runs-on: ubuntu-latest
    steps:

      # 🧠 STEP 1: Calculate Day
      - name: Get current day
        id: day
        uses: actions/github-script@v7
        with:
          script: |
            const issues = await github.rest.issues.listForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              state: "all",
              per_page: 100
            });

            const day = Math.floor(issues.data.length / 5) + 1;
            core.setOutput("day", day);

      # 🔒 STEP 2: Close Previous Day Issues
      - name: Close previous day issues
        uses: actions/github-script@v7
        with:
          script: |
            const day = ${{ steps.day.outputs.day }};
            const prevDay = day - 1;

            if (prevDay <= 0) return;

            const issues = await github.rest.issues.listForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              state: "open"
            });

            for (const issue of issues.data) {
              if (issue.title.includes(`Day ${prevDay}`)) {

                await github.rest.issues.createComment({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  issue_number: issue.number,
                  body: `## ⏳ Challenge Closed

Thanks for contributing 🙌  
👉 Move to Day ${day} 🚀`
                });

                await github.rest.issues.update({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  issue_number: issue.number,
                  state: "closed"
                });
              }
            }

      # 🚀 STEP 3: Create UNIQUE Tasks
      - name: Create unique challenges
        uses: actions/github-script@v7
        with:
          script: |
            const day = ${{ steps.day.outputs.day }};

            const tasks = [
              "Create responsive navbar",
              "Build login form",
              "Create button animation",
              "Fix CSS layout bug",
              "Create dark mode toggle",
              "Build to-do app",
              "Create REST API",
              "Build responsive footer",
              "Create modal popup",
              "Build image gallery",
              "Create form validation",
              "Build calculator app",
              "Create dropdown menu",
              "Build profile card UI",
              "Create search bar",
              "Build pagination system",
              "Create loading spinner",
              "Build tab system",
              "Create accordion UI",
              "Build notification system"
            ];

            const startIndex = (day - 1) * 5;

            for (let i = 0; i < 5; i++) {
              const taskIndex = (startIndex + i) % tasks.length;
              const task = tasks[taskIndex];

              const level = i < 2 ? "easy" : i < 4 ? "medium" : "hard";

              await github.rest.issues.create({
                owner: context.repo.owner,
                repo: context.repo.repo,
                title: `Day ${day} - ${level.toUpperCase()} Task ${i+1}: ${task}`,
                body: `
### 🧠 Day ${day} Challenge

### 🏷 Difficulty:
${level}

### 📌 Task:
${task}

### 📂 Folder:
challenges/day-${day}/your-github-username/

---

🔥 Complete daily to maintain your streak!
                `,
                labels: ["daily-challenge", level]
              });
            }

      # 🏆 STEP 4: Viral Leaderboard
      - name: Create leaderboard
        uses: actions/github-script@v7
        with:
          script: |
            const day = ${{ steps.day.outputs.day }};

            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: `🏆 Day ${day} Leaderboard`,
              body: `
## 🏆 Daily Leaderboard

Top contributors will be featured 🚀

💡 Want to be here?
- Solve challenge
- Submit PR
- Get merged

🔥 Stay consistent. Stay ahead.
              `,
              labels: ["leaderboard"]
            });
