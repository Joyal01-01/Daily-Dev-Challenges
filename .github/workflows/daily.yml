name: Daily Challenge System (7-Day Project Build)

on:
  schedule:
    - cron: "0 3 * * *" # Runs every day at 3:00 AM
  workflow_dispatch:

jobs:
  daily-system:
    runs-on: ubuntu-latest
    permissions:
      issues: write
      contents: read
    steps:
      - name: Generate Dashboard Challenges
        uses: actions/github-script@v7
        env:
          FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const allIssues = await github.rest.issues.listForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              state: "all",
              labels: "nexus-dashboard-challenge",
              per_page: 100
            });

            const challengeIssues = allIssues.data.filter(i => i.title.includes("Phase"));
            const currentDay = (challengeIssues.length % 7) + 1;

            const projectPhases = [
              {
                title: "Foundation & Theme Engine",
                task: "Setup Vite + Tailwind. Create a CSS variable-based theme engine (Midnight, Forest, and Sunset themes).",
                details: "Focus on global layout using CSS Grid for the dashboard tiles."
              },
              {
                title: "Real-time Weather Widget",
                task: "Integrate the OpenWeatherMap API (or similar). Fetch data based on user location.",
                details: "Handle loading skeletons and API error states gracefully."
              },
              {
                title: "The 'Flow' Pomodoro Timer",
                task: "Build a circular progress timer with start/pause/reset functionality using `useEffect` and `setInterval`.",
                details: "Add a subtle 'tick' sound or notification when the timer ends."
              },
              {
                title: "Smart Task Manager (CRUD)",
                task: "Create a Task list with Priority levels (Low, Medium, High). Implement LocalStorage persistence.",
                details: "Use `useReducer` for state management instead of simple `useState`."
              },
              {
                title: "Interactive Analytics Card",
                task: "Build a 'Productivity Stats' card using Framer Motion to animate progress bars for tasks completed.",
                details: "Visualize data—how many tasks are high priority vs low."
              },
              {
                title: "Custom Search & Quick Links",
                task: "Build a command-palette style search bar (Ctrl+K style) to filter tasks or jump to external links.",
                details: "Focus on keyboard accessibility (focus states and Esc to close)."
              },
              {
                title: "Performance Audit & PWA",
                task: "Optimize for lighthouse scores (90+). Add a Manifest file to make it a Progressive Web App (PWA).",
                details: "Final deployment and 'Offline Mode' verification."
              }
            ];

            if (currentDay > 7 && context.eventName !== 'workflow_dispatch') return;
            
            const phase = projectPhases[currentDay - 1];

            // Close previous Nexus tasks
            const openIssues = await github.rest.issues.listForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              state: "open"
            });

            for (const issue of openIssues.data) {
              if (issue.labels.some(l => l.name === 'nexus-dashboard-challenge')) {
                await github.rest.issues.update({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  issue_number: issue.number,
                  state: "closed",
                  labels: issue.labels.filter(l => l.name !== 'current-task').map(l => l.name)
                });
              }
            }

            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: `📅 Nexus Day ${currentDay}: Phase ${currentDay} - ${phase.title}`,
              body: `## 🟢 PROJECT: NEXUS DASHBOARD\n` +
                    `> **Level up your State Management and API integration skills.**\n\n` +
                    `### 🛠 Phase ${currentDay} Task\n` +
                    `**Objective:** ${phase.task}\n\n` +
                    `**Pro Tip:** ${phase.details}\n\n` +
                    `### 📂 Dashboard Architecture\n` +
                    `\`\`\`text\n` +
                    `src/\n` +
                    ` ├── api/         # Axios/Fetch instances\n` +
                    ` ├── context/     # Theme & Auth Context\n` +
                    ` ├── components/\n` +
                    ` │    ├── widgets/ # Weather, Timer, Tasks\n` +
                    ` │    └── common/  # Buttons, Inputs\n` +
                    ` └── utils/       # Formatters, LocalStorage helpers\n` +
                    `\`\`\`\n\n` +
                    `**Submission:** \`projects/nexus-dashboard/day-${currentDay}/abhishekgoswami/\`\n` +
                    `--- \n` +
                    `⚡ **Don't use AI for logic.** Read the docs, solve the bug, get the dopamine!`,
              labels: ["nexus-dashboard-challenge", `day-${currentDay}`, "current-task"]
            });
