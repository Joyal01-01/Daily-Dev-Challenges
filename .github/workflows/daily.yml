name: Daily Challenge System (Viral & Fixed)

on:
  schedule:
    - cron: "0 3 * * *" # Runs every day at 3:00 AM
  workflow_dispatch: # Allows you to click "Run workflow" manually

jobs:
  daily-system:
    runs-on: ubuntu-latest
    permissions:
      issues: write
      contents: read
    steps:
      # 🧠 STEP 1: Calculate Day & Create Tasks
      - name: Generate Challenges
        uses: actions/github-script@v7
        env:
          FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            // 1. Get all issues to calculate the current Day
            const allIssues = await github.rest.issues.listForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              state: "all"
            });

            // Filter for only "Daily Challenge" issues to get an accurate day count
            const challengeIssues = allIssues.data.filter(i => i.title.includes("Day"));
            const currentDay = Math.floor(challengeIssues.length / 5) + 1;
            
            const tasks = [
              "Create responsive navbar", "Build login form", "Create button animation",
              "Fix CSS layout bug", "Create dark mode toggle", "Build to-do app",
              "Create REST API", "Build responsive footer", "Create modal popup",
              "Build image gallery", "Create form validation", "Build calculator app",
              "Create dropdown menu", "Build profile card UI", "Create search bar",
              "Build pagination system", "Create loading spinner", "Build tab system",
              "Create accordion UI", "Build notification system"
            ];

            const startIndex = (currentDay - 1) * 5;

            // 2. Close Yesterday's Issues
            const openIssues = await github.rest.issues.listForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              state: "open"
            });

            for (const issue of openIssues.data) {
              if (issue.title.includes(`Day ${currentDay - 1}`)) {
                await github.rest.issues.createComment({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  issue_number: issue.number,
                  body: `## ⏳ Challenge Closed\nMove to Day ${currentDay} 🚀`
                });
                await github.rest.issues.update({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  issue_number: issue.number,
                  state: "closed"
                });
              }
            }

            // 3. Create 5 New Challenges
            for (let i = 0; i < 5; i++) {
              const taskIndex = (startIndex + i) % tasks.length;
              const task = tasks[taskIndex];
              const level = i < 2 ? "easy" : i < 4 ? "medium" : "hard";

              await github.rest.issues.create({
                owner: context.repo.owner,
                repo: context.repo.repo,
                title: `Day ${currentDay} - ${level.toUpperCase()} Task ${i+1}: ${task}`,
                body: `### 🧠 Day ${currentDay} Challenge\n\n**Difficulty:** ${level}\n**Task:** ${task}\n**Folder:** challenges/day-${currentDay}/your-username/\n\n🔥 Solve this to keep your streak green!`,
                labels: ["daily-challenge", level]
              });
            }

            // 4. Create the Leaderboard
            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: `🏆 Day ${currentDay} Leaderboard`,
              body: `## 🏆 Day ${currentDay} Leaderboard\n\nSolve today's tasks and submit a PR to see your name here! 🚀`,
              labels: ["leaderboard"]
            });
