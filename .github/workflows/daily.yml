name: Multi-Stack Daily Challenge System v2

on:
  schedule:
    - cron: "0 3 * * *" # Every day at 3:00 AM UTC (8:45 AM Nepal Time)
  workflow_dispatch:
    inputs:
      force_day:
        description: "Force a specific day number (e.g. 1). Leave empty for auto."
        required: false
        default: ""

jobs:
  post-all-stack-challenges:
    runs-on: ubuntu-latest

    permissions:
      issues: write
      contents: read

    steps:
      - name: Post One Challenge Per Stack
        uses: actions/github-script@v7
        env:
          FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |

            // ─────────────────────────────────────────────────────────────
            //  CHALLENGE BANK
            //  Each stack has multiple challenges.
            //  Every day, ALL stacks post 1 challenge simultaneously.
            //  The challenge index rotates per stack independently.
            // ─────────────────────────────────────────────────────────────

            const challenges = {

              react: [
                {
                  title: "Responsive Navbar with Dark/Light Mode",
                  level: "Beginner",
                  task: "Build a fully responsive Navbar component. Include a hamburger menu for mobile and a dark/light mode toggle using `useState` + CSS variables. Persist the theme choice in `localStorage`.",
                  tips: "Think in components: `<Navbar>`, `<NavLinks>`, `<ThemeToggle>`. Store theme in `localStorage` so it survives a page refresh.",
                  concepts: ["useState", "CSS Variables", "localStorage", "Responsive"],
                  folder: "react-challenges/navbar-dark-light"
                },
                {
                  title: "Pomodoro Timer with useEffect",
                  level: "Intermediate",
                  task: "Build a Pomodoro timer (25 min work / 5 min break). Use `useEffect` + `setInterval` for the countdown. Add start, pause, reset controls and a session counter.",
                  tips: "Always clear the interval on component unmount. Try `useReducer` for cleaner state across timer modes.",
                  concepts: ["useEffect", "setInterval", "useReducer", "Cleanup"],
                  folder: "react-challenges/pomodoro-timer"
                },
                {
                  title: "GitHub Profile Finder",
                  level: "Intermediate",
                  task: "Fetch a GitHub user's public profile from the GitHub REST API. Show avatar, bio, repo count, followers, and top 5 repos. Add loading skeletons and error handling for invalid usernames.",
                  tips: "Use `async/await` inside `useEffect`. Build a custom `useFetch` hook to reuse the logic.",
                  concepts: ["Fetch API", "Custom hooks", "Loading states", "Error handling"],
                  folder: "react-challenges/github-finder"
                },
                {
                  title: "Kanban Task Board with Drag & Drop",
                  level: "Advanced",
                  task: "Build a Kanban board with To Do / In Progress / Done columns. Tasks are draggable between columns using the HTML5 Drag & Drop API. Persist board state in `localStorage`.",
                  tips: "Use `crypto.randomUUID()` for task IDs. Use `useReducer` for board state. Try the native API before reaching for a library.",
                  concepts: ["Drag & Drop API", "useReducer", "localStorage", "Composition"],
                  folder: "react-challenges/kanban-board"
                },
                {
                  title: "Real-time Weather Dashboard",
                  level: "Intermediate",
                  task: "Build a weather dashboard using OpenWeatherMap API. Show current weather + 5-day forecast + city search. Add °C/°F toggle. Handle API errors gracefully.",
                  tips: "Debounce the search input. Store your API key in a `.env` file — never hardcode it.",
                  concepts: ["API integration", "Debouncing", "env variables", "Conditional rendering"],
                  folder: "react-challenges/weather-dashboard"
                },
                {
                  title: "Multi-step Registration Form",
                  level: "Intermediate",
                  task: "Build a 3-step form: Personal Info → Account Setup → Review & Submit. Validate each step before advancing. Show a progress bar and animate transitions between steps.",
                  tips: "Keep all form data in a single state object at the parent. Use a step index to control which panel renders.",
                  concepts: ["Controlled components", "Validation", "State lifting", "Step nav"],
                  folder: "react-challenges/multi-step-form"
                },
                {
                  title: "Command Palette (Ctrl+K Search)",
                  level: "Advanced",
                  task: "Build a Spotlight-style command palette that opens with Ctrl+K. It should filter pages, actions, and links. Support keyboard navigation: ↑↓ to move, Enter to select, Esc to close.",
                  tips: "Use a global `keydown` listener in `useEffect`. Use `useRef` for focus management.",
                  concepts: ["Global events", "useRef", "Keyboard a11y", "Fuzzy search"],
                  folder: "react-challenges/command-palette"
                }
              ],

              python: [
                {
                  title: "Automated File Organizer",
                  level: "Beginner",
                  task: "Scan a folder and automatically sort files into subfolders by extension: `/images`, `/documents`, `/videos`, `/others`. Log every move to a `.log` file. Add a `--dry-run` flag that previews changes without moving anything.",
                  tips: "Use `os` + `shutil` modules. `argparse` handles the CLI flags cleanly.",
                  concepts: ["os module", "shutil", "argparse", "Logging"],
                  folder: "python-challenges/file-organizer"
                },
                {
                  title: "Web Scraper with BeautifulSoup",
                  level: "Intermediate",
                  task: "Scrape quotes.toscrape.com — extract all quotes, authors, and tags across all pages. Save results to both `.json` and `.csv`. Handle pagination automatically.",
                  tips: "Add `time.sleep(1)` between requests. Never scrape sites that forbid it in their robots.txt.",
                  concepts: ["requests", "BeautifulSoup4", "Pagination", "CSV/JSON export"],
                  folder: "python-challenges/web-scraper"
                },
                {
                  title: "CLI Password Manager",
                  level: "Intermediate",
                  task: "Build a terminal password manager. Features: add, get, list, delete entries. Encrypt stored passwords using `cryptography` (Fernet). Store in a local encrypted JSON file.",
                  tips: "Use `PBKDF2HMAC` to derive the master key from a passphrase. Use `getpass` for secure input — never `input()`.",
                  concepts: ["Fernet encryption", "PBKDF2HMAC", "getpass", "JSON storage"],
                  folder: "python-challenges/cli-password-manager"
                },
                {
                  title: "Email Automation Scheduler",
                  level: "Intermediate",
                  task: "Read a CSV of recipients + messages + send times. Send scheduled emails using `smtplib`. Support an HTML email template. Test using Mailtrap (free fake SMTP).",
                  tips: "Use the `schedule` library for timing. Store credentials in `.env` via `python-dotenv`.",
                  concepts: ["smtplib", "schedule", "python-dotenv", "HTML emails"],
                  folder: "python-challenges/email-scheduler"
                },
                {
                  title: "Data Analysis with Pandas",
                  level: "Intermediate",
                  task: "Pick any public CSV dataset from Kaggle. Load with Pandas, clean missing values, group by key columns, and generate 3 meaningful visualizations using Matplotlib or Seaborn. Export a summary report.",
                  tips: "Always call `df.describe()` and `df.info()` first. Document every cleaning decision.",
                  concepts: ["Pandas", "Data cleaning", "GroupBy", "Matplotlib"],
                  folder: "python-challenges/data-analysis"
                }
              ],

              uiux: [
                {
                  title: "Netflix-style Card UI",
                  level: "Beginner",
                  task: "Recreate the Netflix homepage card grid using only HTML + CSS. Focus on hover effects (scale + overlay), CSS Grid for the responsive layout, and a dark color scheme.",
                  tips: "Use `repeat(auto-fill, minmax(180px, 1fr))` for the grid. The overlay is pure CSS: `opacity: 0` → `opacity: 1` on hover with `transition`.",
                  concepts: ["CSS Grid", "Hover effects", "Transitions", "Dark UI"],
                  folder: "uiux-challenges/netflix-card-ui"
                },
                {
                  title: "Personal Portfolio Landing Page",
                  level: "Beginner",
                  task: "Design and build a portfolio landing page. Required sections: hero, about, skills, projects grid, contact. Must be fully responsive and look polished on real mobile.",
                  tips: "Use an 8px spacing system. Pick 2 fonts max. Test on a real phone, not just DevTools.",
                  concepts: ["Typography scale", "8px grid", "Responsive", "Visual hierarchy"],
                  folder: "uiux-challenges/portfolio-landing"
                },
                {
                  title: "Banking Dashboard UI",
                  level: "Intermediate",
                  task: "Design a finance dashboard: account balance card, recent transactions list, spending chart (Chart.js or CSS), quick action buttons. Include both light and dark mode.",
                  tips: "Use color purposefully: green = income, red = expense. Maintain WCAG AA contrast ratios throughout.",
                  concepts: ["Data viz", "Accessibility", "Color semantics", "Card layouts"],
                  folder: "uiux-challenges/banking-dashboard"
                },
                {
                  title: "Mobile App UI — Habit Tracker",
                  level: "Intermediate",
                  task: "Design a mobile-first (375px) habit tracker UI: daily checklist, weekly streak calendar, progress ring per habit, bottom navigation bar.",
                  tips: "Minimum tap target: 44×44px. Use `aspect-ratio` for progress rings. Design for thumb zones.",
                  concepts: ["Mobile-first", "Touch targets", "Progress rings", "Bottom nav"],
                  folder: "uiux-challenges/habit-tracker-ui"
                },
                {
                  title: "Mini Design System",
                  level: "Advanced",
                  task: "Build a mini design system: color palette, typography scale (6 sizes), spacing scale, and 5 components: Button (3 variants), Input, Card, Badge, Alert. Document each component.",
                  tips: "Use CSS custom properties as design tokens. This becomes a reusable starter for all future projects.",
                  concepts: ["Design tokens", "CSS variables", "Component API", "Documentation"],
                  folder: "uiux-challenges/design-system"
                }
              ],

              fastapi: [
                {
                  title: "Todo CRUD API with Pydantic Validation",
                  level: "Beginner",
                  task: "Build a full CRUD API for todos. Endpoints: GET /todos, GET /todos/{id}, POST /todos, PUT /todos/{id}, DELETE /todos/{id}. Use Pydantic models for all request/response validation.",
                  tips: "Use an in-memory list first — get the API design right before adding a database. Test every endpoint in Swagger UI at `/docs`.",
                  concepts: ["FastAPI routing", "Pydantic", "HTTP methods", "Status codes"],
                  folder: "fastapi-challenges/todo-api"
                },
                {
                  title: "JWT Authentication System",
                  level: "Intermediate",
                  task: "Add JWT auth to a FastAPI app. Implement: POST /register, POST /login (returns access token), and protected GET /me endpoint. Hash passwords with bcrypt.",
                  tips: "Use `python-jose` for JWT and `passlib[bcrypt]` for hashing. Use `OAuth2PasswordBearer` — FastAPI has built-in support.",
                  concepts: ["JWT", "bcrypt", "OAuth2PasswordBearer", "Protected routes"],
                  folder: "fastapi-challenges/jwt-auth"
                },
                {
                  title: "File Upload & Image Processing API",
                  level: "Intermediate",
                  task: "Accept image uploads, resize to 3 sizes (thumbnail / medium / large) using Pillow, and return the processed URLs. Add file type validation and size limits.",
                  tips: "Use `UploadFile` + `BackgroundTasks`. Organize uploads in a local folder by date.",
                  concepts: ["UploadFile", "Pillow", "BackgroundTasks", "File validation"],
                  folder: "fastapi-challenges/file-upload-api"
                },
                {
                  title: "Real-time Chat with WebSockets",
                  level: "Advanced",
                  task: "Build a real-time chat room using FastAPI WebSockets. Support multiple rooms, broadcast to all clients in a room, and show join/leave notifications. Build a minimal HTML frontend to test it.",
                  tips: "Use a `ConnectionManager` class per room. Test with multiple browser tabs open simultaneously.",
                  concepts: ["WebSockets", "ConnectionManager", "Broadcast", "Real-time"],
                  folder: "fastapi-challenges/websocket-chat"
                },
                {
                  title: "Blog API with PostgreSQL + SQLAlchemy",
                  level: "Advanced",
                  task: "Build a Blog API: CRUD for users and posts, nested author info in responses, pagination, search by title. Use PostgreSQL + SQLAlchemy ORM + Alembic for migrations.",
                  tips: "Use `asyncpg` for async DB. Always index columns you filter or sort by. Alembic migrations are non-negotiable.",
                  concepts: ["SQLAlchemy ORM", "Alembic", "Async DB", "Pagination"],
                  folder: "fastapi-challenges/blog-api-postgres"
                }
              ],

              cybersecurity: [
                {
                  title: "Network Packet Sniffer with Scapy",
                  level: "Beginner",
                  task: "Use Scapy to capture live packets. Display: source IP, destination IP, protocol (TCP/UDP/ICMP), and payload size. Save captures to a `.pcap` file viewable in Wireshark.",
                  tips: "Run with root privileges. Use `sniff(filter='tcp', count=20)` during testing. Only use on networks you own.",
                  concepts: ["Scapy", "TCP/IP layers", "Packet filtering", "PCAP"],
                  folder: "cybersecurity/packet-sniffer"
                },
                {
                  title: "Multi-threaded Port Scanner",
                  level: "Beginner",
                  task: "Build a port scanner in Python. Scan a given IP for open ports in a range. Display service names for common ports. Export a report. Only scan systems you have permission to scan.",
                  tips: "Use `socket` + `threading`. Add a 0.5s timeout per port or it will run forever.",
                  concepts: ["socket", "threading", "TCP handshake", "Service enumeration"],
                  folder: "cybersecurity/port-scanner"
                },
                {
                  title: "Bash System Monitoring Tool",
                  level: "Intermediate",
                  task: "Write a Bash script that monitors CPU, RAM, disk space, and active network connections. Color-coded alerts when any metric exceeds a threshold. Run as a cron job every 5 minutes.",
                  tips: "Use `top`, `free`, `df`, `netstat`. ANSI color codes: red = danger, yellow = warning, green = healthy. Log to `/var/log/sysmonitor.log`.",
                  concepts: ["Bash scripting", "System commands", "Cron jobs", "ANSI colors"],
                  folder: "cybersecurity/bash-system-monitor"
                },
                {
                  title: "Password Strength Analyzer",
                  level: "Beginner",
                  task: "Analyze password strength: length, character mix, and match against 10,000 common passwords. Return a score out of 100 and specific improvement suggestions.",
                  tips: "Use `zxcvbn` for real-world strength estimation. Download a truncated `rockyou.txt` for the common passwords check.",
                  concepts: ["String analysis", "Security heuristics", "zxcvbn", "Common passwords"],
                  folder: "cybersecurity/password-analyzer"
                },
                {
                  title: "Log File Intrusion Detector",
                  level: "Intermediate",
                  task: "Parse an Apache/Nginx access log. Detect: brute-force (10+ 401s from same IP), SQL injection patterns in URLs, unusual traffic spikes. Generate an HTML report of findings.",
                  tips: "Use Python regex for log parsing. Group by IP with `collections.Counter`. This is basic SIEM work.",
                  concepts: ["Log parsing", "Regex", "Pattern detection", "HTML report"],
                  folder: "cybersecurity/log-analyzer"
                }
              ],

              javascript: [
                {
                  title: "Vanilla JS Todo App",
                  level: "Beginner",
                  task: "Build a todo app with zero frameworks. Features: add, delete, mark complete, filter by status (all/active/completed), persist with `localStorage`.",
                  tips: "Use event delegation on the list container instead of individual items. Use `JSON.parse/stringify` for localStorage.",
                  concepts: ["DOM manipulation", "localStorage", "Event delegation", "JSON"],
                  folder: "javascript-challenges/vanilla-todo"
                },
                {
                  title: "Infinite Scroll Gallery",
                  level: "Intermediate",
                  task: "Build an infinite scroll image gallery using the Unsplash API. Load 12 images initially. Detect scroll end with `IntersectionObserver` and fetch the next page automatically. Add a loading spinner.",
                  tips: "`IntersectionObserver` is far more performant than a scroll event listener. Store your API key in a config object.",
                  concepts: ["Fetch API", "IntersectionObserver", "Pagination", "Loading states"],
                  folder: "javascript-challenges/infinite-scroll"
                },
                {
                  title: "Real-time Search Filter with Highlighting",
                  level: "Beginner",
                  task: "Build a searchable list of 50+ items (countries or movies from a JSON file). Filter in real time as the user types. Highlight matched text in results. Add category filter chips.",
                  tips: "Debounce with `setTimeout`. Highlight with `String.replace()` + regex wrapped in a `<mark>` tag.",
                  concepts: ["Debouncing", "Array filter/map", "Regex highlight", "Filter chips"],
                  folder: "javascript-challenges/realtime-search"
                }
              ],

              fullstack: [
                {
                  title: "Full-stack Notes App (React + FastAPI)",
                  level: "Intermediate",
                  task: "Build a note-taking app end-to-end. Backend: FastAPI + SQLite CRUD. Frontend: React with create/edit forms and list view. Connect via Fetch. Deploy backend to Render (free tier).",
                  tips: "Handle CORS with FastAPI's `CORSMiddleware`. Use React Router for `/notes` and `/notes/:id`.",
                  concepts: ["FastAPI + React", "CORS", "SQLite", "Full-stack flow"],
                  folder: "fullstack-projects/notes-app"
                },
                {
                  title: "URL Shortener with Click Analytics",
                  level: "Advanced",
                  task: "Build a Bitly-style URL shortener. Backend: FastAPI generates a 6-char code, stores it in SQLite, and tracks click count. Frontend: React form, short link display, copy-to-clipboard, and analytics view.",
                  tips: "Use `secrets.token_urlsafe(6)` for codes. Track clicks by incrementing a counter on each redirect request.",
                  concepts: ["URL shortening", "SQLite", "Click tracking", "Clipboard API"],
                  folder: "fullstack-projects/url-shortener"
                },
                {
                  title: "JWT Auth System (React + FastAPI)",
                  level: "Advanced",
                  task: "Complete auth system: Register, Login, protected Dashboard, Logout. Backend: FastAPI + JWT + bcrypt. Frontend: React with protected routes. Store token in httpOnly cookie (not localStorage).",
                  tips: "httpOnly cookies are immune to XSS attacks — safer than localStorage for tokens. Use `axios` with `withCredentials: true`.",
                  concepts: ["JWT", "httpOnly cookies", "Protected routes", "Token refresh"],
                  folder: "fullstack-projects/auth-system"
                }
              ]
            };

            // ─────────────────────────────────────────────────────────────
            //  STACK METADATA
            // ─────────────────────────────────────────────────────────────

            const stackMeta = {
              react:         { emoji: "⚛️",  label: "stack-react",         who: "Anand, Ashmit" },
              python:        { emoji: "🐍",  label: "stack-python",        who: "Bhumika, Alson" },
              uiux:          { emoji: "🎨",  label: "stack-uiux",          who: "Kristina" },
              fastapi:       { emoji: "⚡",  label: "stack-fastapi",       who: "Alson" },
              cybersecurity: { emoji: "🔐",  label: "stack-cybersecurity", who: "Bhumika" },
              javascript:    { emoji: "🟨",  label: "stack-javascript",    who: "Everyone" },
              fullstack:     { emoji: "🚀",  label: "stack-fullstack",     who: "Everyone" }
            };

            // ─────────────────────────────────────────────────────────────
            //  DETERMINE GLOBAL DAY NUMBER
            //  Based on how many "daily-challenge-day-*" marker issues exist
            // ─────────────────────────────────────────────────────────────

            const markerIssues = await github.rest.issues.listForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              state: "all",
              labels: "challenge-day-marker",
              per_page: 100
            });

            // Force day via workflow_dispatch input, otherwise auto-increment
            let globalDay = markerIssues.data.length + 1;
            const inputDay = parseInt(context.payload.inputs?.force_day || "0");
            if (inputDay > 0) globalDay = inputDay;

            const weekNum = Math.ceil(globalDay / 7);

            // ─────────────────────────────────────────────────────────────
            //  CLOSE ALL CURRENTLY OPEN DAILY CHALLENGES
            // ─────────────────────────────────────────────────────────────

            const openIssues = await github.rest.issues.listForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              state: "open",
              labels: "daily-challenge",
              per_page: 100
            });

            for (const issue of openIssues.data) {
              await github.rest.issues.update({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: issue.number,
                state: "closed"
              });
            }

            // ─────────────────────────────────────────────────────────────
            //  POST ONE ISSUE PER STACK — all on the same day
            // ─────────────────────────────────────────────────────────────

            const stackNames = Object.keys(challenges);

            for (const stackName of stackNames) {
              const meta = stackMeta[stackName];
              const stackChallenges = challenges[stackName];

              // Count how many times this stack has already been used
              const pastStackIssues = await github.rest.issues.listForRepo({
                owner: context.repo.owner,
                repo: context.repo.repo,
                state: "all",
                labels: meta.label,
                per_page: 100
              });

              const stackRound = pastStackIssues.data.length % stackChallenges.length;
              const challenge  = stackChallenges[stackRound];
              const conceptBadges = challenge.concepts.map(c => `\`${c}\``).join(" · ");

              const body =
                `# ${meta.emoji} Day ${globalDay} — ${stackName.toUpperCase()} Challenge\n\n` +
                `> **Week ${weekNum}** | Level: **${challenge.level}** | For: **${meta.who}**\n\n` +
                `---\n\n` +
                `## 🛠 Task\n\n` +
                `${challenge.task}\n\n` +
                `## 💡 Pro Tip\n\n` +
                `${challenge.tips}\n\n` +
                `## 🧠 Concepts You'll Practice\n\n` +
                `${conceptBadges}\n\n` +
                `## 📂 Submission Folder\n\n` +
                `\`\`\`\n` +
                `${challenge.folder}/your-github-username/\n` +
                `\`\`\`\n\n` +
                `## ✅ Submission Checklist\n\n` +
                `- [ ] Fork the repository\n` +
                `- [ ] Create your folder: \`${challenge.folder}/your-github-username/\`\n` +
                `- [ ] Add a \`README.md\` — include a short description + screenshot\n` +
                `- [ ] Use clean, meaningful commit messages\n` +
                `- [ ] Open a Pull Request titled: \`[${stackName.toUpperCase()}] ${challenge.title} — @yourusername\`\n` +
                `- [ ] Comment below with your PR link 👇\n\n` +
                `---\n\n` +
                `> 💬 **Stuck?** Share your code, your error, and what you've already tried — not just "it doesn't work".\n` +
                `>\n` +
                `> 🔥 **Don't use AI to write your logic.** Read the docs, break the problem into steps, earn the understanding.\n` +
                `>\n` +
                `> 👀 **Everyone is welcome to try any stack's challenge** — cross-stack learning is encouraged!`;

              await github.rest.issues.create({
                owner: context.repo.owner,
                repo: context.repo.repo,
                title: `${meta.emoji} Day ${globalDay}: ${challenge.title} [${stackName.toUpperCase()}]`,
                body: body,
                labels: [
                  "daily-challenge",
                  meta.label,
                  challenge.level.toLowerCase(),
                  `week-${weekNum}`
                ]
              });

              // Small delay between issue creation to avoid GitHub API rate limits
              await new Promise(r => setTimeout(r, 500));
            }

            // ─────────────────────────────────────────────────────────────
            //  CREATE A DAY MARKER ISSUE (used to track the day counter)
            //  This is a simple counter — it stays closed immediately
            // ─────────────────────────────────────────────────────────────

            const markerIssue = await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: `📅 Day ${globalDay} — Week ${weekNum} challenges posted`,
              body: `Auto-generated day marker. Day ${globalDay} challenges have been posted for all 7 stacks.\n\nStacks: React · Python · UI/UX · FastAPI · Cybersecurity · JavaScript · Full-stack`,
              labels: ["challenge-day-marker"]
            });

            // Close the marker immediately — it's just a counter, not a discussion
            await github.rest.issues.update({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: markerIssue.data.number,
              state: "closed"
            });
